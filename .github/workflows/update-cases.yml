name: "Daily Supreme Court Update"

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      term_year:
        description: "SCOTUS term year (e.g. 2024). Leave blank to auto-detect."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    name: Fetch and process new cases
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run daily update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TERM_YEAR: ${{ github.event.inputs.term_year }}
        run: npx tsx scripts/update-cases.ts

      - name: Commit new case data
        run: |
          git config user.name  "Supreme Court Wiki Bot"
          git config user.email "bot@supreme-court-wiki.noreply"
          git add data/
          if git diff --cached --quiet; then
            echo "No new case data — nothing to commit."
          else
            CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "chore: automated case update — ${CHANGED} file(s) changed [skip ci]

Triggered by daily cron at $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Committed and pushed ${CHANGED} updated file(s)."
          fi
